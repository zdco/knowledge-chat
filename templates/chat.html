<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全能 AI 助手</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f7f7f8;--chat-bg:#fff;--user-bg:#e3f2fd;--ai-bg:#f5f5f5;--border:#e0e0e0;--primary:#1976d2;--text:#333;--text-secondary:#666;--tool-bg:#f0f1f3;--tool-border:#d8dbe0;--tool-text:#444;--tool-header:#2b6cb0;--tool-dim:#888;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.header{background:var(--primary);color:#fff;padding:16px 24px;font-size:18px;font-weight:600;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.header .left{display:flex;align-items:center;gap:10px}
.header span{font-size:24px}
.header-actions{display:flex;gap:8px}
.header-actions button{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all .2s}
.header-actions button:hover{background:rgba(255,255,255,0.25)}
.chat-container{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:85%;padding:14px 18px;border-radius:var(--radius);line-height:1.7;font-size:14px;word-break:break-word;flex-shrink:0}
.msg-user{align-self:flex-end;background:var(--user-bg);border-bottom-right-radius:4px;margin-top:8px}
.msg-ai{align-self:flex-start;background:var(--ai-bg);border-bottom-left-radius:4px}
.msg-ai p{margin:0.4em 0}
.msg-ai table{border-collapse:collapse;margin:8px 0;font-size:13px;width:100%}
.msg-ai th,.msg-ai td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.msg-ai th{background:#e8e8e8}
.msg-ai pre{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;font-size:13px}
.msg-ai code{font-family:"Fira Code",Consolas,monospace;font-size:13px}
.msg-ai p code{background:#e8e8e8;padding:2px 6px;border-radius:4px;color:#c7254e}

/* 工具调用块 - details 展开方案 */
.tool-block{align-self:flex-start;max-width:90%;width:90%;background:var(--tool-bg);border:1px solid var(--tool-border);border-radius:10px;font-size:13px;font-family:"Fira Code",Consolas,monospace;overflow:hidden;flex-shrink:0}
.tool-block summary{cursor:pointer;padding:10px 14px;color:var(--tool-header);font-weight:600;font-size:12px;display:flex;align-items:center;gap:8px;list-style:none;user-select:none}
.tool-block summary::-webkit-details-marker{display:none}
.tool-block summary .tool-name{color:var(--tool-header)}
.tool-block summary .tool-preview{color:var(--tool-dim);font-weight:400;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.tool-block summary .tool-status{font-size:11px;font-weight:400}
.tool-block summary .tool-status.running{color:#2b6cb0}
.tool-block summary .tool-status.done{color:var(--tool-dim)}
.tool-block .tool-detail{padding:0 14px 10px;border-top:1px solid var(--tool-border)}
.tool-block .tool-detail .label{color:#7c3aed;margin:8px 0 4px;font-size:12px}
.tool-block .tool-detail pre{margin:0;white-space:pre-wrap;font-size:12px;max-height:300px;overflow-y:auto}
.tool-block .tool-detail pre::-webkit-scrollbar{width:6px}
.tool-block .tool-detail pre::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
.tool-block .tool-detail .tool-input-pre{color:#9a5b2f}
.tool-block .tool-detail .tool-output-pre{color:var(--tool-text)}
/* 加载动画 */
.tool-spinner{display:inline-block;width:12px;height:12px;border:2px solid #2b6cb0;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.input-area{flex-shrink:0;padding:16px 24px;background:#fff;border-top:1px solid var(--border);display:flex;gap:12px}
.input-area textarea{flex:1;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;resize:none;outline:none;font-family:inherit;min-height:48px;max-height:120px}
.input-area textarea:focus{border-color:var(--primary)}
.input-area button{padding:0 24px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:14px;cursor:pointer;font-weight:600;white-space:nowrap}
.input-area button:hover{background:#1565c0}
.input-area button:disabled{background:#bbb;cursor:not-allowed}
.typing{display:inline-block;width:8px;height:8px;background:var(--primary);border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.thinking-indicator{align-self:flex-start;display:flex;align-items:center;gap:8px;padding:10px 16px;color:var(--text-secondary);font-size:13px;flex-shrink:0}
.thinking-dots{display:flex;gap:4px}
.thinking-dots span{width:6px;height:6px;background:var(--primary);border-radius:50%;animation:blink 1.2s infinite}
.thinking-dots span:nth-child(2){animation-delay:0.2s}
.thinking-dots span:nth-child(3){animation-delay:0.4s}
.examples{text-align:center;color:var(--text-secondary);margin-top:auto;margin-bottom:auto;padding:40px}
.examples h2{font-size:20px;margin-bottom:20px;color:var(--text)}
.example-group{margin-top:18px}
.example-group h3{font-size:14px;color:var(--text-secondary);margin-bottom:10px;font-weight:500}
.examples .chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.examples .chip{background:#fff;border:1px solid var(--border);padding:10px 16px;border-radius:20px;cursor:pointer;font-size:13px;transition:all .2s}
.examples .chip:hover{border-color:var(--primary);color:var(--primary);background:var(--user-bg)}

/* 历史会话侧栏 */
.history-sidebar{position:fixed;top:0;left:-320px;width:320px;height:100vh;background:#fff;border-right:1px solid var(--border);z-index:100;transition:left .25s ease;display:flex;flex-direction:column;box-shadow:2px 0 12px rgba(0,0,0,0.1)}
.history-sidebar.open{left:0}
.history-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.3);z-index:99;display:none}
.history-overlay.open{display:block}
.history-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:16px}
.history-header button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);padding:4px 8px}
.history-list{flex:1;overflow-y:auto;padding:8px}
.history-item{padding:12px 16px;border-radius:8px;cursor:pointer;margin-bottom:4px;transition:background .15s;display:flex;justify-content:space-between;align-items:center}
.history-item:hover{background:var(--bg)}
.history-item.active{background:var(--user-bg)}
.history-item .title{font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.history-item .time{font-size:11px;color:var(--text-secondary);margin-left:8px;white-space:nowrap}
.history-item .delete-btn{display:none;background:none;border:none;color:#e53935;cursor:pointer;font-size:14px;padding:2px 6px;margin-left:4px}
.history-item:hover .delete-btn{display:inline-block}
.history-empty{text-align:center;color:var(--text-secondary);padding:40px 20px;font-size:14px}
.share-modal-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center}
.share-modal{background:#fff;border-radius:12px;padding:24px;width:420px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.share-modal h3{margin:0 0 16px;font-size:16px;color:var(--text)}
.share-link-box{display:flex;gap:8px;margin-top:8px}
.share-link-box input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;color:var(--text)}
.share-link-box button{padding:8px 16px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap}
.share-link-box button:hover{background:#1565c0}
.share-modal .close-btn{margin-top:12px;text-align:right}
.share-modal .close-btn button{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 16px;font-size:13px;cursor:pointer;color:var(--text-secondary)}
.share-modal .close-btn button:hover{background:var(--bg)}
</style>
</head>
<body>
<div class="history-overlay" id="historyOverlay" onclick="toggleHistory()"></div>
<div class="history-sidebar" id="historySidebar">
  <div class="history-header">
    <span>对话历史</span>
    <button onclick="toggleHistory()" title="关闭">&times;</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<div class="header">
  <div class="left"><span>🤖</span> 全能 AI 助手</div>
  <div class="header-actions">
    <button onclick="shareChat()" id="shareBtn">🔗 分享</button>
    <button onclick="toggleHistory()">📋 历史</button>
    <button onclick="newChat()">＋ 新对话</button>
  </div>
</div>
<div class="chat-container" id="chatBox">
  <div class="examples" id="welcome">
    <h2>有什么可以帮你的？</h2>
    <p style="color:var(--text-secondary)">我可以搜索代码、文档和配置来回答你的问题</p>
    {% for group in example_groups %}
    <div class="example-group">
      <h3>{{ group.name }}</h3>
      <div class="chips">
        {% for ex in group.examples %}
        <div class="chip" onclick="fillInput('{{ ex }}')">{{ ex }}</div>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>
</div>
<div class="input-area">
  <textarea id="userInput" placeholder="输入你的问题..." rows="1" onkeydown="handleKey(event)"></textarea>
  <button id="sendBtn" onclick="sendMessage()">发送</button>
</div>
<script>
marked.setOptions({highlight:(code,lang)=>{if(lang&&hljs.getLanguage(lang))return hljs.highlight(code,{language:lang}).value;return hljs.highlightAuto(code).value},breaks:true});

const chatBox=document.getElementById('chatBox');
const userInput=document.getElementById('userInput');
const sendBtn=document.getElementById('sendBtn');
let history=[];
let sending=false;

// ── 对话历史持久化 ──────────────────────────────
const STORAGE_KEY='mdschat_sessions';
let currentSessionId=null;

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

function loadSessions(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch{return[]}
}
function saveSessions(sessions){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(sessions));
}
function saveCurrentSession(){
  if(!currentSessionId||history.length===0)return;
  const sessions=loadSessions();
  const idx=sessions.findIndex(s=>s.id===currentSessionId);
  const title=history.find(m=>m.role==='user')?.content?.slice(0,50)||'新对话';
  const session={id:currentSessionId,title,time:Date.now(),history,dom:chatBox.innerHTML};
  if(idx>=0)sessions[idx]=session;else sessions.unshift(session);
  // 最多保留 50 条
  if(sessions.length>50)sessions.length=50;
  saveSessions(sessions);
}
function startNewSession(){
  currentSessionId=genId();
  history=[];
}

// ── 历史侧栏 ──────────────────────────────────
function toggleHistory(){
  const sidebar=document.getElementById('historySidebar');
  const overlay=document.getElementById('historyOverlay');
  const isOpen=sidebar.classList.contains('open');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
  if(!isOpen)renderHistoryList();
}
function renderHistoryList(){
  const list=document.getElementById('historyList');
  const sessions=loadSessions();
  if(sessions.length===0){
    list.innerHTML='<div class="history-empty">暂无对话历史</div>';
    return;
  }
  list.innerHTML=sessions.map(s=>{
    const d=new Date(s.time);
    const timeStr=(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    const active=s.id===currentSessionId?'active':'';
    return `<div class="history-item ${active}" onclick="loadSession('${s.id}')">
      <span class="title">${escHtml(s.title)}</span>
      <span class="time">${timeStr}</span>
      <button class="delete-btn" onclick="event.stopPropagation();deleteSession('${s.id}')" title="删除">✕</button>
    </div>`;
  }).join('');
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function loadSession(id){
  if(sending)return;
  const sessions=loadSessions();
  const session=sessions.find(s=>s.id===id);
  if(!session)return;
  currentSessionId=session.id;
  history=session.history||[];
  // 恢复 DOM
  const welcome=document.getElementById('welcome');
  if(welcome)welcome.style.display='none';
  chatBox.innerHTML=session.dom||'';
  scrollBottom();
  toggleHistory();
}
function deleteSession(id){
  const sessions=loadSessions().filter(s=>s.id!==id);
  saveSessions(sessions);
  if(id===currentSessionId){newChat();}
  renderHistoryList();
}
function newChat(){
  if(sending)return;
  saveCurrentSession();
  startNewSession();
  location.reload();
}

// ── 初始化 ──────────────────────────────────────
startNewSession();

// ── 消息渲染 ──────────────────────────────────
function fillInput(text){userInput.value=text;userInput.focus()}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function isNearBottom(){return chatBox.scrollHeight-chatBox.scrollTop-chatBox.clientHeight<80}
let userScrolled=false;
chatBox.addEventListener('scroll',()=>{userScrolled=!isNearBottom()});
function scrollBottom(){if(!userScrolled)chatBox.scrollTop=chatBox.scrollHeight}

function addMsg(role,html){
  const d=document.createElement('div');
  d.className='msg msg-'+role;
  d.innerHTML=html;
  chatBox.appendChild(d);
  scrollBottom();
  return d;
}

// ── 工具调用块 ──────────────────────────────────
function addToolBlock(toolName,input){
  const inputStr=typeof input==='object'?JSON.stringify(input,null,2):String(input);
  let preview='';
  if(input.keyword)preview=input.keyword;
  else if(input.path)preview=input.path;
  else if(input.pattern)preview=input.pattern;
  else if(input.command)preview=input.command;
  if(preview.length>60)preview=preview.slice(0,60)+'…';

  const block=document.createElement('details');
  block.className='tool-block';
  block.innerHTML=`
    <summary>
      <span class="tool-status running"><span class="tool-spinner"></span> 执行中</span>
      <span class="tool-name">${escHtml(toolName)}</span>
      <span class="tool-preview">${escHtml(preview)}</span>
    </summary>
    <div class="tool-detail">
      <div class="label">输入参数</div>
      <pre class="tool-input-pre">${escHtml(inputStr)}</pre>
      <div class="label">输出结果</div>
      <pre class="tool-output-pre">等待结果...</pre>
    </div>`;
  chatBox.appendChild(block);
  scrollBottom();
  return block;
}

function setToolResult(block,output){
  const statusEl=block.querySelector('.tool-status');
  statusEl.className='tool-status done';
  statusEl.textContent='✓ 完成';
  const outputEl=block.querySelector('.tool-output-pre');
  outputEl.textContent=output||'(无输出)';
}

// ── 发送消息 ──────────────────────────────────
async function sendMessage(){
  const text=userInput.value.trim();
  if(!text||sending)return;
  sending=true;
  sendBtn.disabled=true;
  userScrolled=false;

  const welcome=document.getElementById('welcome');
  if(welcome)welcome.style.display='none';

  addMsg('user',escHtml(text));
  history.push({role:'user',content:text});
  userInput.value='';
  userInput.style.height='auto';

  // 显示思考中指示器
  const thinkingEl=document.createElement('div');
  thinkingEl.className='thinking-indicator';
  thinkingEl.innerHTML='<div class="thinking-dots"><span></span><span></span><span></span></div> 思考中...';
  chatBox.appendChild(thinkingEl);
  scrollBottom();

  let aiDiv=null;
  let aiText='';
  let fullAiText='';
  let currentToolBlock=null;

  try{
    const resp=await fetch('/kchat/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,history:history.slice(0,-1)})});
    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buffer='';
    let eventType='';

    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop();

      for(const line of lines){
        if(line.startsWith('event: ')){
          eventType=line.slice(7).trim();
        }else if(line.startsWith('data: ')){
          const raw=line.slice(6);
          let data;
          try{data=JSON.parse(raw)}catch{continue}

          if(eventType==='tool_start'){
            if(thinkingEl.parentNode)thinkingEl.remove();
            // 工具调用前，结束当前 AI 回复块
            if(aiDiv){
              aiDiv=null;
              aiText='';
            }
            currentToolBlock=addToolBlock(data.tool,data.input||{});
          }else if(eventType==='tool_result'){
            if(currentToolBlock)setToolResult(currentToolBlock,data.output||'');
            currentToolBlock=null;
          }else if(eventType==='text_delta'){
            if(thinkingEl.parentNode)thinkingEl.remove();
            const delta=data.delta||'';
            // 过滤工具调用间的无意义占位文本（纯标点/空白）
            if(!aiDiv&&/^[\s.,;:!?。，；：！？…·\-]+$/.test(delta))continue;
            // 工具调用结束后的文本，创建新的 AI 消息块
            if(!aiDiv){
              aiDiv=addMsg('ai','');
              aiText='';
            }
            aiText+=delta;
            fullAiText+=delta;
            aiDiv.innerHTML=marked.parse(aiText);
            scrollBottom();
          }else if(eventType==='error'){
            if(thinkingEl.parentNode)thinkingEl.remove();
            addMsg('ai','<span style="color:red">错误: '+(data.message||'未知错误')+'</span>');
          }else if(eventType==='done'){
            if(fullAiText)history.push({role:'assistant',content:fullAiText});
            saveCurrentSession();
          }
          eventType='';
        }
      }
    }
  }catch(e){
    if(thinkingEl.parentNode)thinkingEl.remove();
    addMsg('ai','<span style="color:red">请求失败: '+e.message+'</span>');
  }
  sending=false;
  sendBtn.disabled=false;
  userInput.focus();
}

// ── 分享功能 ──────────────────────────────────
async function shareChat(){
  if(sending){alert('请等待回复完成后再分享');return}
  if(history.length===0){alert('当前没有对话内容可分享');return}
  const title=history.find(m=>m.role==='user')?.content?.slice(0,50)||'分享的对话';
  // 克隆对话区域，移除欢迎页
  const clone=chatBox.cloneNode(true);
  const welcome=clone.querySelector('#welcome');
  if(welcome)welcome.remove();
  const dom=clone.innerHTML;
  try{
    const resp=await fetch('/kchat/api/share',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,messages:history,dom})});
    const data=await resp.json();
    if(!resp.ok){alert(data.error||'分享失败');return}
    showShareModal(location.origin+data.share_url);
  }catch(e){alert('分享失败: '+e.message)}
}
function showShareModal(url){
  const overlay=document.createElement('div');
  overlay.className='share-modal-overlay';
  overlay.onclick=function(e){if(e.target===overlay)overlay.remove()};
  overlay.innerHTML=`<div class="share-modal">
    <h3>分享链接已生成</h3>
    <p style="font-size:13px;color:var(--text-secondary);margin:0 0 8px">复制链接发给同事，打开即可查看完整对话</p>
    <div class="share-link-box">
      <input type="text" id="shareLinkInput" value="${url}" readonly onclick="this.select()">
      <button onclick="copyShareLink()">复制</button>
    </div>
    <div class="close-btn"><button onclick="this.closest('.share-modal-overlay').remove()">关闭</button></div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#shareLinkInput').select();
}
function copyShareLink(){
  const input=document.getElementById('shareLinkInput');
  navigator.clipboard.writeText(input.value).then(()=>{
    const btn=input.nextElementSibling;
    btn.textContent='已复制';
    setTimeout(()=>{btn.textContent='复制'},2000);
  }).catch(()=>{input.select();document.execCommand('copy')});
}

userInput.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'});
</script>
</body>
</html>
