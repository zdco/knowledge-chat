# 知识域：行情主站接口
name: "行情主站接口"
description: "JCE 接口定义、请求参数、数据结构、源码实现"

# 本域数据文件目录（所有资料都在这里，自包含）
data_path: "data"

# 该知识域的 prompt 片段（会合并到总 system prompt）
prompt: |
  ## 行情主站接口
  - data/jce/ 下是 JCE 接口定义文件（*.jce），定义了所有请求和响应结构
  - data/src/ 下是服务端 C++ 实现（*.cpp, *.h）
  - data/doc/ 下是接口文档（*.md）
  - 常见查询：接口参数、枚举值、数据结构、调用示例

# 示例问题（合并展示在欢迎页）
examples:
  - "stockHq 接口怎么调用？请求参数是什么？"
  - "E_MARKET_CODE 里深圳是多少？"
  - "哪些接口用到了 HeaderInfo？"
  - "K线接口和分时接口的请求参数有什么区别？"
