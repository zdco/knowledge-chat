# ============================================================
# 知识域配置模板
# 使用方法：
#   1. 拷贝整个 _template/ 目录，重命名为知识域英文名
#   2. 将所有相关资料（源码、文档、配置等）拷贝到 data/ 下
#   3. 修改此文件中的各字段
#   4. 重启服务生效
#
# 原则：每个知识域目录必须自包含，所有资料放在 data/ 下，
# 整个目录可直接拷贝到部署服务器使用。
# ============================================================

# 必填：知识域名称，显示在欢迎页分组标题
name: "知识域名称"

# 必填：知识域描述，帮助 AI 理解该领域范围
description: "用一句话描述这个知识域包含什么内容"

# 数据文件目录（所有资料都放在这里）
# 引擎会自动将此目录纳入搜索范围
data_path: "data"

# 必填：prompt 片段，合并到总 system prompt
# 告诉 AI data/ 下的文件组织、常见查询类型等
prompt: |
  ## 知识域标题
  - data/src/ 下是什么文件
  - data/doc/ 下是什么文件
  - 常见查询类型有哪些

# 可选：示例问题，显示在欢迎页供用户点击
examples:
  - "示例问题 1？"
  - "示例问题 2？"
