# ============================================================
# 知识域配置模板
# 使用方法：
#   1. 拷贝整个 _template/ 目录，重命名为知识域英文名
#   2. 将所有相关资料（源码、文档、配置等）拷贝到 data/ 下
#   3. 修改此文件中的各字段
#   4. 重启服务生效
#
# 原则：每个知识域目录必须自包含，所有资料放在 data/ 下，
# 整个目录可直接拷贝到部署服务器使用。
# ============================================================

# 必填：知识域名称，显示在欢迎页分组标题
name: "知识域名称"

# 必填：知识域描述，帮助 AI 理解该领域范围
description: "用一句话描述这个知识域包含什么内容"

# 数据文件目录（所有资料都放在这里）
# 引擎会自动将此目录纳入搜索范围
data_path: "data"

# memory/ 目录会在创建知识域时自动创建，用于 AI 学习笔记
# AI 会将有价值的结论、纠正、隐性知识写入 memory/ 下的 Markdown 文件
# 无需手动配置，笔记通过 search 工具全文检索

# 必填：prompt 片段，合并到总 system prompt
# 告诉 AI data/ 下的文件组织、常见查询类型等
prompt: |
  ## 知识域标题
  - data/src/ 下是什么文件
  - data/doc/ 下是什么文件
  - 常见查询类型有哪些

# 可选：示例问题，显示在欢迎页供用户点击
examples:
  - "示例问题 1？"
  - "示例问题 2？"

# 可选：数据库连接配置
# AI 会使用 run_python 工具生成 Python 代码连接这些数据库进行查询和分析
# databases:
#   - name: 生产库
#     type: oracle          # 数据库类型：mysql / oracle
#     host: 10.0.0.1
#     port: 1521
#     service_name: orcl    # Oracle 专用
#     user: readonly
#     password: xxx
#   - name: 业务库
#     type: mysql
#     host: 10.0.0.2
#     port: 3306
#     database: biz_db      # MySQL 专用
#     user: readonly
#     password: xxx
