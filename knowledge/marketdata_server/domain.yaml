prompt: |
  ## 行情主站数据服务（MarketDataServer）

  ### 文件结构
  - data/jce/ 下是 JCE 接口定义文件（*.jce），定义了所有请求/响应结构和枚举
    - Common.jce — 公共类型定义：HeaderInfo（请求头）、ClientInfo、E_CLI_COMP_TYPE（压缩选项）、E_HQ_PACKET_TYPE（包类型）、HISTORY_DATA_TYPE（K线/分时/资金流类型枚举）、E_STOCK_CATEGORY（股票分类，如 A股/B股/基金/债券/港股通等）
    - CommonData.jce — 公共数据结构：HStockUnique（股票唯一标识=市场+代码）、E_STOCK_TYPE（股票类型枚举）、E_DATACENTER_BLOCK_TYPE（板块类型：主板/中小板/创业板/科创板等）
    - BasicData.jce — 基础数据结构：E_STOCK_TRADE_STATUS（股票交易状态，含港股通各时段状态）、E_MARKET_TRADE_STATUS（市场交易状态）、HTolMoneyFlow（资金流结构）、HRTMinData（分时数据）、SZTData（涨停数据）、BlockBasicInfo（板块基本信息）
    - BasicHq.jce — 核心行情接口定义：BasicHq 接口类，包含 stockDict/stockHq/stockBaseInfo/rtMinData/kLineData/tickData/type2Stock/block2Stock/zhRank/bkLed 等全部行情方法，以及推送相关的 regCodes/regKLine/regRtMin 等注册接口
    - DataCenter.jce — 数据中心接口：历史数据存取、E_DataCenter_Ret 错误码
    - MCacheData.jce — 多市场缓存数据结构：MCacheQuote（行情快照，含开高低收、买卖盘、内外盘等完整字段）
    - AuthQ.jce — 认证查询接口：getAllLoginUser / kickUser
    - AdsData.jce — 广告数据结构
    - FileData.jce — 文件数据结构
    - FuPanBasicData.jce — 复盘基础数据

  - data/src/ 下是 MarketDataServer 服务端 C++ 实现（*.cpp, *.h）
    - BasicHqImp.cpp/h — 核心行情接口实现，实现 BasicHq.jce 中定义的所有接口方法
    - BasicHqProc.cpp/h — 行情处理逻辑
    - BasicHqServer.cpp/h — 服务启动入口
    - WsImp.cpp/h + WsHqImp.cpp/h — WebSocket 行情接口实现
    - WebsocketProtocol.cpp/h — WebSocket 协议处理（握手、帧解析）
    - PushImp.cpp/h + PushReq.cpp/h — 推送机制实现
    - GlobalDataCache.cpp/h — 全局数据缓存管理
    - StockCache.cpp/h — 股票数据缓存
    - DataConvert2Jce.cpp/h — 内部数据到 JCE 结构的转换
    - DataCompare.cpp/h — 差量数据比较
    - AuthMag.cpp/h + AuthQImp.cpp/h — 认证管理
    - PermissionMag.cpp/h — 权限管理（L1/L2 权限校验）
    - ConnectionMng.cpp/h — 连接管理
    - Session.cpp/h — 会话管理
    - StatMonitor.cpp/h + ReportMonitor.cpp/h — 统计监控
    - BitmapUtil.cpp/h — 位图工具
    - BlowFish.cpp/h — Blowfish 加密
    - OptStockManager.cpp/h + OptStockPush.cpp/h — 自选股管理和推送
    - MarketDDERank.cpp/h — 市场 DDE 排名
    - MarketTradePeriod.cpp/h — 市场交易时间段管理
    - Dxjlcalc.cpp/h — 大小净量计算
    - RangeStats.cpp/h — 区间统计
    - XuaAdaptor.cpp/h — XUA 客户端适配
    - CtlIDConverter.cpp/h — 控制 ID 转换
    - AHStocksHQ.cpp/h — AH 股行情

  - data/auth/ 下是 AuthServer 认证服务源码
    - AuthServer.cpp/h — 认证服务入口
    - AuthImp.cpp/h — 认证接口实现
    - AuthConn.cpp/h — 认证连接管理
    - AuthProc.cpp/h — 认证处理逻辑
