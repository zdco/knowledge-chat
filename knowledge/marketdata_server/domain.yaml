  - data/example/ 下是测试和示例客户端
    - mdstest/ — 行情测试客户端（含 L2 登录）
    - mdstestPush/ — 推送测试客户端（含差量恢复）
    - mdsCheck/ — 行情数据校验工具
    - mdsDataCheck/ — 数据检查工具（含 Python Web 界面）
    - multiconnClient/ — 多连接压测客户端
    - websockettest/ — WebSocket 测试客户端
    - HttpWupClient/ — HTTP WUP 客户端
    - authtest/ — 认证测试

  ### 核心概念
  - 技术栈：C++11 + TAF/JCE 框架（腾讯 RPC 框架），CMake 构建，版本 MDS 5.4.5 / Auth 1.0.1
  - 市场代码（marketcode.xml）：sz=0（深圳）、sh=1（上海）、HK=2（港股）、gzqh=3（股指期货）、HSI=16（恒生指数）、USI=17（美股指数）等
  - HeaderInfo 是所有请求的公共头，shtMarket 字段指定市场（-1 默认沪深），eCompress 指定压缩方式
  - HStockUnique 是股票唯一标识 = shtSetcode（市场代码）+ sCode（股票代码）
  - 压缩方式：支持 LZ4 / LZMA / Snappy，可配合差量传输（Diff）减少带宽
  - 包类型 E_HQ_PACKET_TYPE：普通包(0)、差量包(100)、LZ4压缩包(101)、差量+LZ4(102) 等
  - K线类型 HISTORY_DATA_TYPE：日K(0)、1分钟K(1)、5分钟K(2)、15分钟K(3)、30分钟K(4)、60分钟K(5)、分时(6)、周K(7)、月K(8)、季K(9)、年K(10)、日资金流(11)、分笔(12)
  - 股票交易状态 E_STOCK_TRADE_STATUS：未知(0)、已收盘(1)、未开盘(2)、集合竞价(3)、等待开盘(4)、交易中(5)、停牌(9)、临时停牌(10)、盘后交易(11)，以及港股通各时段状态(31-43)
  - 股票分类 E_STOCK_CATEGORY：涵盖 A股、B股、基金、ETF、债券、可转债、指数、期权、港股通、北交所等全部品种
  - 板块类型 E_DATACENTER_BLOCK_TYPE：主板(1)、中小板(2)、创业板(3)、新三板(4)、老三板(7)、科创板(8)
  - 资金流分类：超大宗(>50万股或100万元)、大宗(>10万股或20万元)、中单(>2万股或4万元)、小单(其他)
  - L2 权限：通过 AuthServer 认证，serverKey 加密校验，支持 L1/L2 分级权限
  - 推送机制：支持行情推送(regCodes)、K线推送(regKLine)、分时推送(regRtMin)、自选股推送等，通过 PushImp 管理注册和推送
  - 数据缓存：cacheDuration=3秒（动态数据）、staticCacheDuration=300秒（静态数据），最大缓存200MB

  ### 查询指引
  - 查接口参数和返回值 → 搜索 data/jce/ 下的 .jce 文件，特别是 BasicHq.jce
  - 查枚举值含义 → 搜索 Common.jce（压缩/包类型/K线类型/股票分类）、CommonData.jce（股票类型/板块类型）、BasicData.jce（交易状态/资金流）
  - 查接口文档 → 搜索 data/doc/interface.md（参数表格）和 basicData.md（结构说明）
  - 查具体实现逻辑 → 搜索 data/src/ 下对应的 Imp.cpp 文件，核心是 BasicHqImp.cpp
  - 查推送相关 → 搜索 PushImp.cpp/h、PushReq.cpp/h、OptStockPush.cpp/h
  - 查认证逻辑 → 搜索 data/auth/ 下的 AuthImp.cpp、AuthProc.cpp
  - 查缓存数据管理 → 搜索 data/lib/cachedata/ 下的对应模块
  - 查多市场（港股/外盘）→ 搜索 data/lib/multicachedata/
  - 查配置项 → 搜索 data/conf/ 下的配置文件，主配置是 MarketDataPCServer.conf
  - 查市场代码映射 → 搜索 data/conf/marketcode.xml
  - 查 WebSocket 接入 → 搜索 data/src/WsImp.cpp、WsHqImp.cpp 和 data/doc/行情websocket使用说明.md
  - 查测试用例 → 搜索 data/example/ 下对应的测试目录
  - 查 Confluence 文档 → 用 list_files 浏览 data/wiki/ 目录结构，用 search 搜索关键词
  - 如果要在回复中展示图片，使用 `/mds/wiki/marketdata_server/_attachments/...` 路径

