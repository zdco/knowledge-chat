  - PriceAlarmServerNew/ — 价格告警服务（最复杂的告警模块）
    - PriceAlarmServer.h/cpp — TAF Application 主类
    - PriceAlarmImp.h/cpp — 告警接口实现，提供 addAlarm / delAlarm / modifyAlarm / queryAlarm 等用户告警管理接口
    - AlarmDefine.h — 告警类型定义和常量
    - AlarmRule.h/cpp — 告警规则引擎，判断是否触发告警
    - AlarmConfig.h/cpp — 告警配置管理
    - AlarmUtils.h/cpp — 告警工具函数
    - UserAlarmMgr.h/cpp — 用户告警管理
    - User.h/cpp — 用户模型
    - StockData.h/cpp — 股票数据
    - StockMgr.h/cpp — 股票管理
    - MarketDataMgr.h/cpp — 行情数据管理
    - IndexDataMgr.h/cpp — 指数数据管理
    - IndexDataStockPool.h/cpp — 指数数据股票池
    - OtherDataMgr.h/cpp — 其他数据管理
    - Formula.h/cpp — 公式计算
    - CmdMgr.h/cpp — 命令管理
    - DbManager.h/cpp, DbDefine.h — 数据库操作
    - PrivilegeMgr.h/cpp — 权限管理
    - HealthMonitor.h/cpp — 健康监控
    - StatisticsMgr.h/cpp — 统计管理
    - Push/ — 推送子模块
      - PushMgr.h/cpp — 推送管理器
