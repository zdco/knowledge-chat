# knowledge/fupan_system/domain.yaml
name: "复盘&盯盘系统"
description: "股票复盘与盯盘系统，包含涨停计算、涨停查询、价格告警、股票池告警、日高低告警、推送分发等服务的完整源码、JCE接口定义、配置和数据库脚本"

data_path: "data"

prompt: |
  ## 复盘&盯盘系统（fupan_project）

  ### 项目概况
  - 语言：C++11，框架：TAF（腾讯应用框架）
  - 构建：CMake 3.15+，版本 1.4.0
  - 主要依赖：TAF、MySQL、HQLib（行情库）、ISSvrLib（服务库）、JsonCpp、Redis、Rdkafka、DCache、Oracle、ZSTD
  - 支持 GMSSL 加密、信创系统

  ### 文件结构

  #### data/src/ — 主服务源码，分三大模块

  **FuPan（复盘模块）**：
  - ZTCalcSvr/ — 涨停计算服务（最核心模块）
    - ZTCalcServer.h/cpp — TAF Application 主类，初始化日志、定时器、线程池
    - ZTCalcImp.h/cpp — 服务接口实现，继承 FuPan::ZTCalc，提供 notifyStockZTReason / regZTPush / heartBeat / updateSpecialBlock / getSysMonitorInfo 等接口
    - StockMng.h/cpp — 股池计算管理，接收 CVT 数据，计算涨停池、跌停池、涨停开板池、强势股、连板数
    - BlockMng.h/cpp — 板块数据计算，板块基础数据、风口数据、琅琊榜、板块异动
    - BlockChangeMng.h/cpp — 板块异动计算管理
    - BlockHandler.h/cpp — 板块数据处理器
    - MarketData.h/cpp — CVT 数据接收管理，交易日期/时间管理，退市股票管理
    - MarketTrend.h/cpp — 市场风向计算
    - GlobalVar.h/cpp — 全局配置（交易时间段、线程间隔、行情队列限制）
    - HisFactorMng.h/cpp — 历史因子管理
    - HisFactorModule.h/cpp, HisFactorUnitBase.h/cpp, HisFactorUnits.h/cpp, HisFactorUnits2.h/cpp — 历史因子计算模块和单元
    - CallAuctionMng.h/cpp — 竞价数据管理
    - DataConvert.h/cpp — 数据转换
    - DataUtil.h/cpp — 数据工具
    - FactorDBOperate.h/cpp — 因子数据库操作
    - ListBlock.h/cpp — 板块列表
    - PushMsgMng.h/cpp — 推送消息管理
    - RegDataMng.h/cpp — 注册数据管理
    - StockDictMgr.h/cpp — 股票字典管理
    - StockStrategy.h/cpp — 股票策略
    - zt_util.h/cpp — 涨停工具函数
  - ZTQuerySvr/ — 涨停查询服务
    - ZTQuerySvr.h/cpp — TAF Application 主类
    - ZTQueryImp.h/cpp — 查询接口实现，继承 FuPan::ZTQuery，提供 getZTPool / getBlockData / getMarketTrend / getCallAuction / getHisFactor 等查询接口
    - CacheMgr.h/cpp — 缓存管理，从 ZTCalcSvr 拉取数据缓存
    - FuPanDataMng.h/cpp — 复盘数据管理
    - FuPanDataImp.h/cpp — 复盘数据接口实现
    - FuPanHotDataMng.h/cpp — 复盘热点数据管理
    - DataUtil.h/cpp — 数据工具
    - XuaInfo.h — 用户信息定义

