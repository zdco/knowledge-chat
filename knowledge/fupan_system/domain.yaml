  - upload.sh — 上传脚本

  ### 核心概念
  - 涨停池（ZT Pool）：当日涨停的股票集合，按连板数、一字板等分类
  - 跌停池（DT Pool）：当日跌停的股票集合
  - 开板池：涨停后打开的股票
  - 连板数（ContinueBoard）：连续涨停天数，如"3天3板"
  - 一字板（OneBoard）：开盘即涨停，全天未打开
  - 板块异动（BlockChange）：板块内股票集体异动的检测
  - 琅琊榜：板块排名数据
  - 风口数据：热门板块/概念数据
  - 市场风向（MarketTrend）：整体市场情绪指标
  - 竞价数据（CallAuction）：集合竞价阶段的数据
  - 历史因子（HisFactor）：历史统计因子，用于量化分析
  - CVT：行情数据接收组件，提供实时行情推送
  - TAF：腾讯应用框架，提供 RPC、配置管理、日志等基础设施
  - JCE：TAF 的接口定义语言，类似 Protobuf/Thrift
  - 雪花算法 ID：分布式唯一 ID 生成

  ### 服务架构
  - ZTCalcSvr 接收 CVT 实时行情 → 计算涨停池/板块数据 → 写入数据库 + 推送给 ZTQuerySvr
  - ZTQuerySvr 缓存 ZTCalcSvr 的计算结果 → 对外提供查询接口
  - PriceAlarmServerNew 接收行情 → 匹配用户告警规则 → 触发推送（HTTP/TCP/微信/第三方）
  - DispatchProxyServerNew 作为告警入口 → 一致性哈希分配用户到 PriceAlarmServer 节点
  - StockPoolAlarmServer 监控股票池变化 → 触发告警推送
  - PushCacheServer 缓存推送消息 → 客户端拉取
  - Monitor 各服务定期检查对应业务服务健康状态 → 邮件/企业微信告警

  ### 查询指引
  - 查 JCE 接口定义（请求参数、返回值、枚举）→ 搜索 data/proto/ 下的 .jce 文件
  - 查涨停计算逻辑 → 搜索 data/src/FuPan/ZTCalcSvr/ 下的 StockMng / BlockMng / MarketTrend
  - 查涨停查询接口 → 搜索 data/src/FuPan/ZTQuerySvr/ZTQueryImp.cpp
  - 查告警规则和触发逻辑 → 搜索 data/src/Alarm/PriceAlarmServerNew/AlarmRule.cpp
  - 查告警推送流程 → 搜索 data/src/Alarm/PriceAlarmServerNew/Push/ 目录
  - 查用户告警管理（增删改查）→ 搜索 DispatchProxyImp.cpp 或 PriceAlarmImp.cpp
  - 查数据库表结构 → 搜索 data/doc/sql/ 下的 .sql 文件
  - 查服务配置项 → 搜索 data/doc/conf/ 下对应服务的 .conf 文件
  - 查公共数据结构 → 搜索 data/lib/utils/FuPanUtil.h
  - 查构建配置和依赖 → 搜索 data/CMakeLists.txt 和 data/cmake/
  - 查监控告警逻辑 → 搜索 data/src/Monitor/ 下对应服务目录
  - 查工具使用方法 → 搜索 data/example/ 下对应工具的 README.md

