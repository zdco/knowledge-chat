# knowledge/is_project/domain.yaml

name: "指标&复盘工程"

description: "基于 TAF 框架的 C++ 金融指标计算、行情处理和策略回测系统，包含 31 个微服务、11 个核心库和 129 个 JCE 协议定义"

data_path: "data"

prompt: |
  ## 指标&复盘工程（is_project）

  ### 文件结构
  - data/src/ 下是 31 个 TAF 服务器应用（C++11），按服务名建子目录
    - IndexDataServer/ — 指标主站，实时指标数据订阅与推送，核心类：IndexDataImp（服务实现）、IndexDataMgr（指标数据管理）、ConnMgr（连接与订阅管理）、DirTreeMgr（指标目录树）
    - CpuCalcServer/ — 公式计算服务，CPU 密集型指标计算与编译，核心类：FormulaCalcImp（计算接口）、CalcManager（计算管理）、CalcTaskManager（任务调度）、IndexManager（指标管理）
    - BacktestServer/ — 回测引擎，策略回测与交易模拟，核心类：BacktestImp（回测接口）、TaskManager（任务管理）、BacktestTaskThread（回测线程）
    - LhAucServer/ — 龙虎竞价服务，市场风格评分与题材评分，核心类：LhAucImp（服务实现）、LhAucCalcMgr（计算管理）、LhAucDataMgr（数据缓存）、LhAucDBMgr（数据库操作）
    - LhAucCalcServer/ — 龙虎竞价计算服务，下游计算节点
    - IndexHistoryServer/ — 历史指标数据服务
    - IndexStockPoolServer/ — 股池管理服务
    - IndexZNFactorServer/ — 因子计算服务
    - FormulaQueryServer/ — 公式查询服务，K线/分时画线数据查询
    - FormulaSignalServer/ — 公式信号服务
    - PushServer/ — 数据推送服务
    - StockPoolServer/ — 股票池服务
    - CtmStockPoolServer/ — 自定义股票池服务
    - TinyMarketDataServer/ — 轻量行情服务
    - ServiceMonitorServer/ — 服务监控
    - IndexSignalServer/ — 信号计算服务
    - BacktestQueryServer/ — 回测查询服务
    - DayKMergeServer/ — 日K合并服务
    - DynamicHistoryIndexServer/ — 动态历史指标服务
    - RecalcServer/ — 重算服务
    - HqHelperServer/ — 行情辅助服务
    - StrategyServer/ — 策略服务
    - AINiuSanServer/ — AI牛散服务
    - AIPickStockServer/ — AI选股服务
    - GnnPoolBackTestServer/ — GNN股池回测服务
    - IndexSyncServer/ — 指标同步服务
    - IndexToMysqlServer/ — 指标入库服务
    - JTCollectL2DataServer/ — L2数据采集服务
    - UPSDKAuthServer/ — UPSDK鉴权服务
    - ExamineSever/ — 审核服务

  - data/lib/ 下是 11 个核心库
    - ibase/ — 指标服务基础框架：CacheData（缓存管理）、ConnMgr（连接与订阅管理，支持全量/增量推送）、RegClient（上游注册客户端）、IndexBaseImp（TAF服务基类）
    - isutils/ — 工具库（最大）：HqDataMgr（行情数据管理，拉取实时行情/日K/股票字典）、IndexHistoryMgr（历史指标查询/保存）、DBOperate（数据库操作基类，同步/异步SQL）、httputils（HTTP/HTTPS工具）、SecureMap.h（安全Map）
    - uphq/ — 行情数据处理
    - datasaver/ — 数据持久化工具
    - rtminhis/ — 实时分钟历史数据
    - stockindexcache/ — 股票指标缓存
    - indexsdk/ — 指标SDK
    - common/ — 通用代码
    - utils/ — 工具函数
    - nlohmann/ — JSON库（仅头文件）

  - data/jce/ 下是 JCE 协议定义文件（129个），按业务域组织
    - index/（38个）— 核心指标协议：IndexBase.jce（基础类型：BUS_TYPE业务类型、PERIOD_TYPE周期类型、DATA_COMPACT_MODE压缩模式、RegIndexReq订阅请求）、IndexData.jce（指标数据服务接口）、Backtest.jce（回测服务接口）、FormulaCalc.jce（公式计算接口）、LhAuc.jce（龙虎竞价接口）、ISBasicData.jce（基础数据定义）
    - hqextend/（11个）— 行情扩展协议：板块异动、资金流向、龙虎榜等
    - hqjce/（11个）— 行情基础协议：股票行情、市场数据
    - alarm/（9个）— 告警协议
    - datacenter/（7个）— 数据中心协议
    - fupan/（7个）— 复盘协议
    - sa/（7个）— 数据分析协议
    - algo/（5个）— 算法协议
    - hqtools/（5个）— 行情工具协议
    - news/（5个）— 资讯协议
    - pickstock/（5个）— 选股协议
    - push/（5个）— 推送协议
    - comm/（2个）— 公共协议：MessageNotifyServer.jce（通知订阅管理）、NotifyProxy.jce（告警通知）

  - data/conf/ 下是 8 个服务器的配置文件（IndexDataServer、CpuCalcServer、BacktestServer 等）
  - data/example/ 下是 28 个示例程序，演示各服务的客户端调用
  - data/cmake/ 下是 CMake 构建模块（19个 Find 脚本）
  - data/uttest/ 下是 6 个单元测试（Google Test）
  - data/script/ 下是部署脚本和 SQL 脚本

  ### 核心概念
  - TAF 服务结构：每个服务器包含 {ServerName}.cpp（main入口）、{ServerName}Imp.cpp/h（Servant实现）、各种 *Mgr 管理器类
  - 单例模式：所有管理器继承 TC_Singleton<T>，全局唯一实例
  - 线程安全：TC_ThreadRWLocker（读写锁）、TC_ThreadLock（互斥锁）保护共享数据
  - 观察者模式：IIndexNotify 接口，IndexDataMgr 订阅 CacheData 的数据更新
  - 数据流向：行情数据(QT) → HqDataMgr → 各种CalcMgr → 各种DataMgr → DBMgr → 客户端推送
  - 订阅机制：客户端通过 regIndex() 订阅 → ConnMgr 记录 → RegClient 向上游注册 → CacheData 缓存 → ConnMgr 推送
  - 数据压缩：支持 JCE（无压缩）、LZ4、SNAPPY 三种模式
  - 增量更新：支持全量下发和增量（diff）下发两种模式
  - 周期类型（PERIOD_TYPE）：分时、1分、5分、15分、30分、60分、日、周、月、季、年
  - 业务类型（BUS_TYPE）：复盘、指标
  - 日志宏：{ServerPrefix}Log / {ServerPrefix}ErrLog（如 LuAucDbLog、LuAucDbErrLog）
  - 命名约定：文件和类用 PascalCase，管理器后缀 Mgr，实现类后缀 Imp
  - 构建目标命名：取服务名首字母小写（ids=IndexDataServer, las=LhAucServer）
  - 金额/价格精度：行情价格字段统一放大 10000 倍存储为整数

  ### 查询指引
  - 查某个服务的接口定义 → 搜索 data/jce/index/ 下对应的 .jce 文件
  - 查某个服务的实现逻辑 → 搜索 data/src/{ServerName}/ 下的 Imp.cpp 文件
  - 查某个管理器的职责 → 搜索 data/src/ 或 data/lib/ 下对应的 *Mgr.h 文件
  - 查枚举值和数据结构 → 搜索 data/jce/ 下的 .jce 文件（特别是 index/IndexBase.jce 和 index/ISBasicData.jce）
  - 查公共类型定义 → 搜索 data/jce/comm/ 下的 .jce 文件
  - 查行情相关协议 → 搜索 data/jce/hqjce/ 和 data/jce/hqextend/
  - 查基础框架类（缓存、连接、订阅） → 搜索 data/lib/ibase/
  - 查工具类（行情管理、历史数据、数据库操作） → 搜索 data/lib/isutils/
  - 查配置项 → 搜索 data/conf/{ServerName}/ 下的 .conf 文件
  - 查客户端调用示例 → 搜索 data/example/ 下对应的示例目录
  - 查构建配置和依赖 → 搜索 data/CMakeLists.txt 和 data/cmake/modules/
  - 查部署和运维 → 搜索 data/script/
  - 查数据库表结构 → 搜索 data/script/sql/

examples:
  - "IndexDataServer 的 regIndex 接口怎么调用？请求参数是什么？"
  - "PERIOD_TYPE 枚举有哪些值？分别代表什么周期？"
  - "CpuCalcServer 的公式计算流程是怎样的？"
  - "LhAucServer 的市场风格评分是怎么计算的？"
  - "BacktestServer 回测任务的生命周期是怎样的？支持哪些回测指标？"
