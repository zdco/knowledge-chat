version: "3.8"

services:
  mdschat:
    build: .
    ports:
      - "5001:5001"
    environment:
      - AI_CHAT_API_KEY=${AI_CHAT_API_KEY}
      - AI_CHAT_BASE_URL=${AI_CHAT_BASE_URL:-http://coding.whup.com/}
    volumes:
      # 挂载知识域目录，方便外部添加知识域无需重新构建镜像
      - ./knowledge:/app/knowledge
      # 挂载项目根目录供工具搜索（只读）
      - ../../../:/project:ro
    restart: unless-stopped
