# 全能 AI 助手 - 配置文件

# API 配置（环境变量优先于此处配置：AI_CHAT_BASE_URL / AI_CHAT_API_KEY / AI_CHAT_MODEL）
api:
  # 代理地址（含 /v1 自动走 OpenAI 格式，否则走 Anthropic 格式）
  base_url: "http://coding.whup.com/v1"
  # API 密钥
  api_key: ""
  # 模型名称
  model: "MiniMax-M2.5"
  # 单次回复最大 token 数
  max_tokens: 4096
  # Agent 最大工具调用轮数（防止死循环）
  max_iterations: 50
  # API 格式："anthropic" 或 "openai"，不设置则根据 base_url 是否含 /v1 自动判断
  # 非 Claude 模型（GLM、MiniMax 等）建议用 openai 格式以获得更好的工具调用兼容性
  # api_format: "openai"

# 可用模型（通过 coding.whup.com 代理）：
#   claude-sonnet-4-5-20250929  - 推荐，性价比高
#   claude-sonnet-4-6           - 最新 sonnet
#   claude-haiku-4-5-20251001   - 最快，适合简单问题
#   claude-opus-4-5-20251101    - 最强，适合复杂分析

# 服务配置
server:
  host: "0.0.0.0"
  port: 5001

# 工具配置
tools:
  # 搜索结果最大字符数
  max_output_length: 15000
  # 工具结果推送给前端的最大字符数
  max_display_length: 2000
  # run_python 工具超时时间（秒）
  python_timeout: 300

# 日志配置
logging:
  level: "INFO"
  file: "logs/app.log"
  backup_days: 30
